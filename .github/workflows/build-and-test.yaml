name: Build and test
on:
  - push
  - pull_request

jobs: 
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout EBFM repository
        uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'
      - name: Setup MPI
        uses: mpi4py/setup-mpi@v1
      - name: Create virtual environment and install EBFM
        run: |
          python3 -m venv .venv
          source .venv/bin/activate
          python3 -m pip install --upgrade pip
          pip3 install .
      - name: Check Git version
        run: |
          source .venv/bin/activate
          git --version
      - name: Check EBFM version
        run: |
          source .venv/bin/activate
          ebfm --version
      - name: Run example
        run: |
          source .venv/bin/activate
          ebfm --matlab-mesh examples/dem_and_mask.mat
      - name: Run example with restart
        run: |
          source .venv/bin/activate
          ebfm --matlab-mesh examples/dem_and_mask.mat --restart-dir Reboot
          ebfm --matlab-mesh examples/dem_and_mask.mat --restart-dir Reboot --restart-init --start-time "02-Jan-1979 00:00" --end-time "03-Jan-1979 00:00"
      - name: Run example with (pseudo) coupling
        run: |
          source .venv/bin/activate
          ebfm --matlab-mesh examples/dem_and_mask.mat --couple-to-icon --couple-to-elmer --fake-coupling --no-shading
      - name: Run example with MPI handshake
        run: |
          source .venv/bin/activate
          # Run dummy script first; dummy on rank 0, EBFM on rank 1
          mpirun -np 1 python tests/core/mpi_handshake_dummy.py first : \
                 -np 1 ebfm --matlab-mesh examples/dem_and_mask.mat --end-time "1-Jan-1979 03:00"
          # Run dummy script second; EBFM on rank 0, dummy on rank 1
          mpirun -np 1 ebfm --matlab-mesh examples/dem_and_mask.mat --end-time "1-Jan-1979 03:00" : \
                 -np 1 python tests/core/mpi_handshake_dummy.py second

