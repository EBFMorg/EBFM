repos:
# SPDX-SnippetBegin
# SPDX-License-Identifier: CC-BY-4.0
# This configuration is adapted from LJ Miranda's blog post, 
# "Pre-commits using Black and Flake8" (https://ljvmiranda921.github.io/notebook/2018/06/21/precommits-using-black-and-flake8/)
- repo: https://github.com/psf/black
  rev: stable
  hooks:
  - id: black
- repo: https://github.com/PyCQA/flake8.git
  rev: 7.3.0
  hooks:
  - id: flake8
- repo: https://github.com/astral-sh/ruff-pre-commit
  rev: v0.12.10
  hooks:
  - id: ruff
    args:
    - --fix
    - --target-version=py310
    - --select=UP
- repo: https://github.com/pre-commit/mirrors-mypy
  rev: v1.18.2
  hooks:
  - id: mypy
    args: ["--ignore-missing-imports", "--explicit-package-bases", "src/ebfm/coupling"]
    pass_filenames: false
# SPDX-SnippetEnd

# SPDX-SnippetBegin
# SPDX-SnippetCopyrightText: 2020 Free Software Foundation Europe e.V.
# SPDX-License-Identifier: CC0-1.0
- repo: https://github.com/fsfe/reuse-tool
  rev: v6.2.0
  hooks:
  - id: reuse
# SPDX-SnippetEnd
